<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Somnia — Theme Comparison</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060312;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 48px 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    .header {
      text-align: center;
    }
    .header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #6B6494;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 400;
      color: #EAE2FF;
      letter-spacing: -0.02em;
    }

    .phones {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .phone-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .phone-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9B92C4;
    }

    .phone-wrap {
      width: 390px;
      height: 844px;
      border-radius: 46px;
      overflow: hidden;
      box-shadow:
        0 60px 160px rgba(0,0,0,0.75),
        0 0 0 1.5px #2a2440,
        inset 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
    }

    iframe {
      width: 390px;
      height: 844px;
      border: none;
      display: block;
    }

    .divider {
      width: 1px;
      height: 844px;
      background: #221A40;
      align-self: center;
      flex-shrink: 0;
    }

    /* Responsive: stack on small viewports */
    @media (max-width: 900px) {
      .divider { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="eyebrow">Somnia · Visual Identity</p>
    <h1>Theme Comparison</h1>
  </div>

  <div class="phones">
    <div class="phone-col">
      <div class="phone-label">Pure Indigo</div>
      <div class="phone-wrap">
        <iframe
          src="/tonight?theme=indigo&embed=1"
          title="Pure Indigo theme"
          scrolling="no"
        ></iframe>
      </div>
    </div>

    <div class="divider"></div>

    <div class="phone-col">
      <div class="phone-label">Moonstone</div>
      <div class="phone-wrap">
        <iframe
          src="/tonight?theme=moon&embed=1"
          title="Moonstone theme"
          scrolling="no"
        ></iframe>
      </div>
    </div>
  </div>
</body>
</html>
